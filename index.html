<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화법과 언어 · 문법 학습지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
--bg:#F7F5EF; --paper:#FFFFFF; --ink:#232420; --ink-soft:#5B5D57;
--line:#E3DFD3; --indigo:#2C3A66; --indigo-soft:#EEF1F8;
--jade:#3E6B58; --jade-soft:#E7F1EC; --radius:12px;
}
*{box-sizing:border-box;}
body{margin:0; background:var(--bg); color:var(--ink); font-family:'Noto Sans KR', sans-serif; line-height:1.7;}
.wrap{max-width:760px; margin:0 auto; padding:0 1.5rem 5rem;}
header{padding:3.4rem 0 2.2rem; border-bottom:1px solid var(--line); margin-bottom:2.4rem;}
.eyebrow{font-size:13px; letter-spacing:.14em; color:var(--indigo); font-weight:700; text-transform:uppercase; margin-bottom:.9rem; display:flex; align-items:center; gap:10px;}
.eyebrow .dot{width:6px; height:6px; background:var(--indigo); border-radius:50%; display:inline-block;}
h1{font-family:'Noto Serif KR', serif; font-weight:700; font-size:34px; margin:0 0 .6rem; letter-spacing:-.01em;}
.subtitle{color:var(--ink-soft); font-size:15px;}
.cards{display:flex; flex-direction:column; gap:14px;}
.card{
display:flex; align-items:center; gap:16px;
background:var(--paper); border:1px solid var(--line); border-radius:var(--radius);
padding:1.3rem 1.4rem; text-decoration:none; color:var(--ink);
transition:border-color .15s ease, transform .15s ease;
}
.card:hover{border-color:var(--indigo); transform:translateX(2px);}
.card.disabled{opacity:.5; pointer-events:none;}
.num{
font-family:'Noto Serif KR', serif; font-weight:700; font-size:15px; color:var(--indigo);
width:38px; height:38px; border-radius:50%; background:var(--indigo-soft);
display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.card-body h2{font-family:'Noto Serif KR', serif; font-size:19px; margin:0 0 4px;}
.card-body p{margin:0; font-size:13.5px; color:var(--ink-soft);}
.status{margin-left:auto; font-size:12px; color:var(--jade); background:var(--jade-soft); padding:3px 10px; border-radius:20px; flex-shrink:0;}
.status.soon{color:var(--ink-soft); background:#EFEDE6;}
footer{max-width:760px; margin:0 auto; padding:1.5rem; text-align:center; color:var(--ink-soft); font-size:12.5px; border-top:1px solid var(--line);}
</style>
</head>
<body>
<div class="wrap">
<header>
<div class="eyebrow"><span class="dot"></span>화법과 언어 · 문법</div>
<h1>문법 학습지 모음</h1>
<div class="subtitle">파트를 선택해서 학습을 시작하세요.</div>
</header>

<div class="cards">
<a class="card" href="phoneme/index.html">
<div class="num">01</div>
<div class="card-body">
<h2>음운</h2>
<p>자음과 모음 — 조음 위치·방법, 단모음 체계</p>
</div>
<div class="status">바로가기</div>
</a>

<a class="card disabled" href="word/index.html">
<div class="num">02</div>
<div class="card-body">
<h2>단어</h2>
<p>품사, 단어의 형성 등</p>
</div>
<div class="status soon">준비 중</div>
</a>

<a class="card disabled" href="sentence/index.html">
<div class="num">03</div>
<div class="card-body">
<h2>문장</h2>
<p>문장 성분, 문장의 짜임 등</p>
</div>
<div class="status soon">준비 중</div>
</a>
</div>
</div>
<footer>화법과 언어 · 문법 학습지</footer>
</body>
</html>
