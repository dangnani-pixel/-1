<style>
  :root{--bg:#F7F5EF;--paper:#FFFFFF;--ink:#232420;--ink-soft:#5B5D57;--line:#E3DFD3;--indigo:#2C3A66;--indigo-soft:#EEF1F8;--radius:12px;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Noto Sans KR',sans-serif;line-height:1.7;}
  .wrap{max-width:760px;margin:0 auto;padding:0 1.5rem 5rem;}
  header{padding:3rem 0 2rem;border-bottom:1px solid var(--line);margin-bottom:2rem;}
  .back{font-size:13px;color:var(--indigo);text-decoration:none;}
  .eyebrow{font-size:13px;letter-spacing:.14em;color:var(--indigo);font-weight:700;text-transform:uppercase;margin:1rem 0 .6rem;}
  h1{font-family:'Noto Serif KR',serif;font-weight:700;font-size:30px;margin:0;}
  .cards{display:flex;flex-direction:column;gap:12px;}
  .card{display:flex;align-items:center;gap:14px;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:1.1rem 1.3rem;text-decoration:none;color:var(--ink);}
  .card:hover{border-color:var(--indigo);}
  .num{font-family:'Noto Serif KR',serif;font-weight:700;font-size:14px;color:var(--indigo);width:34px;height:34px;border-radius:50%;background:var(--indigo-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .card-body h2{font-family:'Noto Serif KR',serif;font-size:17px;margin:0;}
</style>
</head>

</header>

</a>
<a class="card" href="02-consonant-change.html">
<div class="num">02</div>

</div>
